spring.datasource.url=jdbc:postgresql://localhost:5433/expense_tracker
spring.datasource.username=expense_user
spring.datasource.password=expense_pass_dev

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT — secret base64-decodes to 41 bytes (> 32 required for HS256)
# plain text: "expenseTrackerSecretKeyForJwtTokens2024!"
app.jwt.secret=ZXhwZW5zZVRyYWNrZXJTZWNyZXRLZXlGb3JKd3RUb2tlbnMyMDI0IQ==
app.jwt.expiration-ms=86400000
