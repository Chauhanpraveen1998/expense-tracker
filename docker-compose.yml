version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: expense-tracker-db
    environment:
      POSTGRES_DB: expense_tracker
      POSTGRES_USER: expense_user
      POSTGRES_PASSWORD: expense_pass_dev
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U expense_user -d expense_tracker"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: expense-tracker-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    depends_on:
      - postgres
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  pgadmin_data:

# Usage:
# ------
# Start:    docker-compose up -d
# Stop:     docker-compose down
# Reset DB: docker-compose down -v && docker-compose up -d
# Logs:     docker-compose logs -f postgres
#
# Connection details:
# -------------------
# Host:     localhost
# Port:     5433  (5432 is reserved for local PostgreSQL)
# Database: expense_tracker
# Username: expense_user
# Password: expense_pass_dev
#
# pgAdmin:  http://localhost:5050
# Email:    admin@expense.com
# Password: admin
